# ==============================================================================
# GMS backend local infrastructure
#
# Default flow in this repository:
# - gateway stack (firmware/src/gateway) runs a cloud/global broker on host port 1883
# - gateway stack also runs a separate local greenhouse broker on host port 18831
# - backend container from this compose connects to the cloud/global broker on 1883
# - timescaledb provides durable backend persistence (no local DB install needed)
# ==============================================================================

services:

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: gms-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: gms_backend
      POSTGRES_USER: gms
      POSTGRES_PASSWORD: gms
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gms -d gms_backend"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    image: maven:3.9-eclipse-temurin-21
    container_name: gms-backend-dev
    working_dir: /workspace/backend/backend
    volumes:
      - ..:/workspace/backend:Z
      - maven_cache:/root/.m2
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MAVEN_OPTS: "-Dfile.encoding=UTF-8"
      SPRING_DATASOURCE_URL: jdbc:postgresql://timescaledb:5432/gms_backend
      SPRING_DATASOURCE_USERNAME: gms
      SPRING_DATASOURCE_PASSWORD: gms
    command: >
      mvn spring-boot:run
      -Dspring-boot.run.profiles=dev
      -Dspring-boot.run.arguments=--gms.mqtt.broker-url=tcp://host.docker.internal:1883
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  maven_cache:
  timescaledb_data:
