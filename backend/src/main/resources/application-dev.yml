# ==============================================================================
# GMS Backend – development profile
# Activate: export SPRING_PROFILES_ACTIVE=dev  (or -Dspring.profiles.active=dev)
#
# Targets the local EMQX Docker container (see infra/docker-compose.yml).
# TLS is disabled; anonymous connections are allowed on port 1883.
# ==============================================================================

server:
  port: 8081

gms:
  mqtt:
    broker-url: tcp://localhost:1883
    client-id-prefix: gms-backend-dev
    username: dev-user
    password: dev-pass
    qos: 1
    clean-session: true
    subscription-topics:
      - "gms/+/+/uplink/#"
      - "gms/+/+/+/telemetry"
      - "gms/+/+/+/alert"
      - "gms/+/+/+/status"
      - "gms/+/+/+/config"
    # Explicitly blank out TLS cert paths so MqttClientFactoryConfig skips SSL setup.
    # application.yml sets defaults (certs/ca.crt etc.) which Spring merges in;
    # empty strings here override those defaults and signal "no TLS in dev".
    tls:
      ca-cert-path: ""
      client-cert-path: ""
      key-password: ""

logging:
  level:
    md.utm.gms: DEBUG
    org.springframework.integration: INFO
    org.eclipse.paho: DEBUG

management:
  endpoint:
    health:
      show-details: always
